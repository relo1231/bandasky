name: Supabase keep-alive ping

on:
  schedule:
    - cron: '0 9 */3 * *'   # každé 3 dni o 9:00 UTC
  workflow_dispatch:          # možnosť spustiť ručne

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://kyerwouliyjmoxcobviv.supabase.co/rest/v1/kategorie?select=id&limit=1")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed with status $STATUS" && exit 1
          fi
